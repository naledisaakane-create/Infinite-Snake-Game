<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∞ SNAKE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --primary: #00ffcc;
  --bg: #03050a;
  --accent: #ff00aa;
}

body {
  background: var(--bg);
  color: var(--primary);
  font-family: 'Share Tech Mono', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  transition: background 1.5s ease;
}

#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.4;
}

.wrapper {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(1.8rem, 5vw, 3.2rem);
  letter-spacing: 0.3em;
  text-shadow: 0 0 30px var(--primary), 0 0 80px var(--primary);
  margin-bottom: 4px;
  transition: color 1s, text-shadow 1s;
}

#level-name {
  font-size: 0.7rem;
  letter-spacing: 0.4em;
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent);
  height: 16px;
  margin-bottom: 10px;
  transition: color 1s, text-shadow 1s;
  text-transform: uppercase;
}

.hud {
  display: flex;
  gap: 30px;
  margin-bottom: 10px;
  font-size: 0.85rem;
  letter-spacing: 0.2em;
}

.hud-item span { opacity: 0.5; }
.hud-item strong {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  color: var(--primary);
  transition: color 1s;
}

#canvas-wrap {
  position: relative;
  border: 2px solid var(--primary);
  box-shadow: 0 0 40px rgba(0,255,204,0.2), 0 0 80px rgba(0,255,204,0.05);
  transition: border-color 1s, box-shadow 1s;
}

canvas#c { display: block; }

#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(3,5,10,0.92);
  gap: 14px;
  transition: opacity 0.4s;
  backdrop-filter: blur(4px);
}

#overlay.hidden { opacity: 0; pointer-events: none; }

#overlay-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  font-weight: 900;
  text-align: center;
  line-height: 1.2;
}

#overlay-sub {
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  opacity: 0.6;
  text-align: center;
  max-width: 280px;
  line-height: 1.8;
}

#level-badge {
  font-family: 'Orbitron', sans-serif;
  font-size: 3rem;
  font-weight: 900;
  opacity: 0.15;
  position: absolute;
  bottom: 20px;
  right: 20px;
  pointer-events: none;
}

button {
  background: transparent;
  border: 2px solid var(--primary);
  color: var(--primary);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.25em;
  padding: 12px 36px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
  box-shadow: 0 0 15px rgba(0,255,204,0.2);
}

button:hover {
  background: var(--primary);
  color: var(--bg);
  box-shadow: 0 0 30px rgba(0,255,204,0.6);
}

.tips {
  margin-top: 8px;
  font-size: 0.65rem;
  opacity: 0.3;
  letter-spacing: 0.15em;
  text-align: center;
}

#level-transition {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}

#level-transition.show { opacity: 1; }

#lt-num {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(4rem, 15vw, 10rem);
  font-weight: 900;
  line-height: 1;
}

#lt-name {
  font-size: clamp(1rem, 3vw, 1.8rem);
  letter-spacing: 0.4em;
  text-transform: uppercase;
  margin-top: -10px;
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="wrapper">
  <div id="title">∞ SNAKE</div>
  <div id="level-name">PRESS START TO BEGIN</div>

  <div class="hud">
    <div class="hud-item"><span>SCORE </span><strong id="score">000</strong></div>
    <div class="hud-item"><span>LEVEL </span><strong id="level-num">1</strong></div>
    <div class="hud-item"><span>BEST </span><strong id="best">000</strong></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="overlay">
      <div id="overlay-title">∞ SNAKE</div>
      <div id="overlay-sub">INFINITE LEVELS<br>EACH ONE A NEW UNIVERSE</div>
      <button id="btn">BEGIN</button>
      <div class="tips">↑↓←→ · WASD · SWIPE</div>
      <div id="level-badge">∞</div>
    </div>
  </div>
</div>

<div id="level-transition">
  <div id="lt-num"></div>
  <div id="lt-name"></div>
</div>

<script>
// ─── LEVELS ────────────────────────────────────────────────────────────────
// Each level has a theme that transforms everything: colors, background, food style, snake style, special effects
const LEVELS = [
  {
    name: "THE VOID",
    primary: "#00ffcc", accent: "#ff00aa", bg: "#03050a",
    snakeHead: "#00ffcc", snakeBody: (i,n) => `rgba(0,${Math.floor(255*(1-i/n))},${Math.floor(200*(1-i/n))},${1-i/n*0.6})`,
    foodColor: "#ff00aa", foodGlow: "#ff00aa",
    bgEffect: "stars",
    gridColor: "rgba(0,255,204,0.04)",
    borderColor: "#00ffcc",
    foodShape: "circle",
  },
  {
    name: "MAGMA CORE",
    primary: "#ff6600", accent: "#ffcc00", bg: "#100500",
    snakeHead: "#ff6600", snakeBody: (i,n) => `rgba(${Math.floor(255*(1-i/n*0.5))},${Math.floor(100*(1-i/n))},0,${1-i/n*0.5})`,
    foodColor: "#ffee00", foodGlow: "#ff6600",
    bgEffect: "lava",
    gridColor: "rgba(255,102,0,0.04)",
    borderColor: "#ff6600",
    foodShape: "diamond",
  },
  {
    name: "DEEP OCEAN",
    primary: "#00aaff", accent: "#00ffee", bg: "#000a10",
    snakeHead: "#00ccff", snakeBody: (i,n) => `rgba(0,${Math.floor(170*(1-i/n*0.3))},${Math.floor(255*(1-i/n*0.4))},${1-i/n*0.5})`,
    foodColor: "#ffff00", foodGlow: "#aaff00",
    bgEffect: "bubbles",
    gridColor: "rgba(0,170,255,0.03)",
    borderColor: "#00aaff",
    foodShape: "star",
  },
  {
    name: "NEON CITY",
    primary: "#ff00ff", accent: "#ffff00", bg: "#080008",
    snakeHead: "#ff00ff", snakeBody: (i,n) => `rgba(${Math.floor(255*(1-i/n*0.5))},0,${Math.floor(255*(1-i/n*0.3))},${1-i/n*0.5})`,
    foodColor: "#ffff00", foodGlow: "#ffaa00",
    bgEffect: "grid3d",
    gridColor: "rgba(255,0,255,0.05)",
    borderColor: "#ff00ff",
    foodShape: "square",
  },
  {
    name: "ARCTIC ZERO",
    primary: "#aaeeff", accent: "#ffffff", bg: "#020810",
    snakeHead: "#aaeeff", snakeBody: (i,n) => `rgba(${Math.floor(150*(1-i/n*0.3))},${Math.floor(220*(1-i/n*0.2))},${Math.floor(255*(1-i/n*0.2))},${1-i/n*0.4})`,
    foodColor: "#ffffff", foodGlow: "#88ddff",
    bgEffect: "snow",
    gridColor: "rgba(170,238,255,0.04)",
    borderColor: "#aaeeff",
    foodShape: "snowflake",
  },
  {
    name: "RADIOACTIVE",
    primary: "#aaff00", accent: "#ffaa00", bg: "#050800",
    snakeHead: "#aaff00", snakeBody: (i,n) => `rgba(${Math.floor(170*(1-i/n*0.4))},${Math.floor(255*(1-i/n*0.3))},0,${1-i/n*0.5})`,
    foodColor: "#ff4400", foodGlow: "#ff8800",
    bgEffect: "radiation",
    gridColor: "rgba(170,255,0,0.04)",
    borderColor: "#aaff00",
    foodShape: "triangle",
  },
  {
    name: "BLOOD MOON",
    primary: "#ff2200", accent: "#ffaa00", bg: "#0a0000",
    snakeHead: "#ff2200", snakeBody: (i,n) => `rgba(${Math.floor(200*(1-i/n*0.3))},${Math.floor(30*(1-i/n))},0,${1-i/n*0.4})`,
    foodColor: "#ffdd00", foodGlow: "#ff6600",
    bgEffect: "embers",
    gridColor: "rgba(255,34,0,0.04)",
    borderColor: "#ff2200",
    foodShape: "moon",
  },
  {
    name: "QUANTUM DREAM",
    primary: "#cc88ff", accent: "#88ffcc", bg: "#050008",
    snakeHead: "#cc88ff", snakeBody: (i,n) => `rgba(${Math.floor(200*(1-i/n*0.3))},${Math.floor(136*(1-i/n*0.4))},${Math.floor(255*(1-i/n*0.2))},${1-i/n*0.4})`,
    foodColor: "#88ffcc", foodGlow: "#44ffaa",
    bgEffect: "quantum",
    gridColor: "rgba(200,136,255,0.04)",
    borderColor: "#cc88ff",
    foodShape: "hexagon",
  },
  {
    name: "SOLAR FLARE",
    primary: "#ffdd00", accent: "#ff6600", bg: "#0a0500",
    snakeHead: "#ffdd00", snakeBody: (i,n) => `rgba(255,${Math.floor(220*(1-i/n*0.4))},0,${1-i/n*0.4})`,
    foodColor: "#ffffff", foodGlow: "#ffaa00",
    bgEffect: "solar",
    gridColor: "rgba(255,221,0,0.04)",
    borderColor: "#ffdd00",
    foodShape: "sun",
  },
  {
    name: "GHOST REALM",
    primary: "#88ffee", accent: "#ffffff", bg: "#040410",
    snakeHead: "rgba(136,255,238,0.9)", snakeBody: (i,n) => `rgba(136,255,238,${0.8 - i/n*0.6})`,
    foodColor: "#ffffff", foodGlow: "#aaaaff",
    bgEffect: "ghosts",
    gridColor: "rgba(136,255,238,0.03)",
    borderColor: "#88ffee",
    foodShape: "ghost",
  },
];

function getLevel(n) {
  // infinite: cycle through and mutate colors slightly after full cycle
  const base = LEVELS[n % LEVELS.length];
  if (n < LEVELS.length) return base;
  // beyond 10 levels: mutate the theme
  const cycle = Math.floor(n / LEVELS.length);
  return { ...base, name: `${base.name} Ω${cycle+1}` };
}

// ─── SETUP ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');

const CELL = 22;
const COLS = Math.min(24, Math.floor((window.innerWidth - 40) / CELL));
const ROWS = Math.min(20, Math.floor((window.innerHeight - 200) / CELL));

canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;
bgCanvas.width = window.innerWidth;
bgCanvas.height = window.innerHeight;

let snake, dir, nextDir, food, score, running, loopTimer;
let currentLevel = 0;
let best = parseInt(localStorage.getItem('snakeBest2') || '0');
document.getElementById('best').textContent = String(best).padStart(3,'0');

let theme = getLevel(0);
let particles = [];
let bgParticles = [];

// ─── BACKGROUND PARTICLES ─────────────────────────────────────────────────
function initBgParticles() {
  bgParticles = [];
  const t = theme;
  if (t.bgEffect === 'stars') {
    for (let i=0;i<120;i++) bgParticles.push({x:Math.random()*bgCanvas.width, y:Math.random()*bgCanvas.height, r:Math.random()*1.5, twinkle:Math.random()*Math.PI*2, speed:Math.random()*0.02});
  } else if (t.bgEffect === 'lava') {
    for (let i=0;i<40;i++) bgParticles.push({x:Math.random()*bgCanvas.width, y:bgCanvas.height+Math.random()*100, vx:(Math.random()-0.5)*0.5, vy:-(0.3+Math.random()*0.8), r:Math.random()*4+2, life:1});
  } else if (t.bgEffect === 'bubbles') {
    for (let i=0;i<60;i++) bgParticles.push({x:Math.random()*bgCanvas.width, y:Math.random()*bgCanvas.height, r:Math.random()*8+2, vy:-(0.2+Math.random()*0.4), alpha:Math.random()*0.3+0.05});
  } else if (t.bgEffect === 'snow') {
    for (let i=0;i<100;i++) bgParticles.push({x:Math.random()*bgCanvas.width, y:Math.random()*bgCanvas.height, r:Math.random()*2+0.5, vx:(Math.random()-0.5)*0.3, vy:0.3+Math.random()*0.5});
  } else if (t.bgEffect === 'embers') {
    for (let i=0;i<80;i++) bgParticles.push({x:Math.random()*bgCanvas.width, y:Math.random()*bgCanvas.height, vx:(Math.random()-0.5)*0.8, vy:-(0.5+Math.random()), r:Math.random()*2+0.5, life:Math.random()});
  } else if (t.bgEffect === 'quantum') {
    for (let i=0;i<50;i++) bgParticles.push({x:Math.random()*bgCanvas.width, y:Math.random()*bgCanvas.height, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5, r:Math.random()*3+1, life:Math.random(), flicker: Math.random()*Math.PI*2});
  } else if (t.bgEffect === 'radiation') {
    for (let i=0;i<5;i++) bgParticles.push({x:Math.random()*bgCanvas.width, y:Math.random()*bgCanvas.height, radius:0, maxR:150+Math.random()*100, speed:0.5+Math.random()});
  } else if (t.bgEffect === 'solar') {
    for (let i=0;i<60;i++) bgParticles.push({x:bgCanvas.width/2, y:bgCanvas.height/2, angle:Math.random()*Math.PI*2, speed:1+Math.random()*2, r:Math.random()*2+0.5, dist:Math.random()*300+50, life:Math.random()});
  } else if (t.bgEffect === 'ghosts') {
    for (let i=0;i<8;i++) bgParticles.push({x:Math.random()*bgCanvas.width, y:Math.random()*bgCanvas.height, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.3, alpha:0.03+Math.random()*0.07, r:30+Math.random()*50});
  } else {
    for (let i=0;i<60;i++) bgParticles.push({x:Math.random()*bgCanvas.width, y:Math.random()*bgCanvas.height, r:Math.random()*1.5, twinkle:Math.random()*Math.PI*2, speed:Math.random()*0.03});
  }
}

function drawBg() {
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  const t = theme;
  const primary = t.primary;
  const accent = t.accent;

  if (t.bgEffect === 'stars') {
    bgParticles.forEach(p => {
      p.twinkle += p.speed;
      const a = 0.3 + 0.5*Math.sin(p.twinkle);
      bgCtx.fillStyle = `rgba(${hexToRgb(primary)},${a})`;
      bgCtx.beginPath(); bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2); bgCtx.fill();
    });
  } else if (t.bgEffect === 'lava') {
    bgParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.life -= 0.005;
      if (p.life <= 0 || p.y < -20) { p.x=Math.random()*bgCanvas.width; p.y=bgCanvas.height+10; p.life=0.8+Math.random()*0.2; }
      bgCtx.fillStyle = `rgba(255,${Math.floor(102*p.life)},0,${p.life*0.4})`;
      bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2); bgCtx.fill();
    });
  } else if (t.bgEffect === 'bubbles') {
    bgParticles.forEach(p => {
      p.y += p.vy;
      if (p.y < -20) p.y = bgCanvas.height + 20;
      bgCtx.strokeStyle = `rgba(${hexToRgb(primary)},${p.alpha})`;
      bgCtx.lineWidth = 1;
      bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2); bgCtx.stroke();
    });
  } else if (t.bgEffect === 'snow') {
    bgParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.y > bgCanvas.height) { p.y=-5; p.x=Math.random()*bgCanvas.width; }
      bgCtx.fillStyle = `rgba(200,240,255,0.4)`;
      bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2); bgCtx.fill();
    });
  } else if (t.bgEffect === 'embers') {
    bgParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.life -= 0.008;
      if (p.life <= 0) { p.x=Math.random()*bgCanvas.width; p.y=bgCanvas.height+5; p.life=0.6+Math.random()*0.4; p.vy=-(0.5+Math.random()); }
      bgCtx.fillStyle = `rgba(255,${Math.floor(80+p.life*100)},0,${p.life*0.5})`;
      bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2); bgCtx.fill();
    });
  } else if (t.bgEffect === 'quantum') {
    bgParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.flicker += 0.05;
      if (p.x<0||p.x>bgCanvas.width) p.vx*=-1;
      if (p.y<0||p.y>bgCanvas.height) p.vy*=-1;
      const a = 0.05 + 0.1*Math.abs(Math.sin(p.flicker));
      bgCtx.fillStyle = `rgba(${hexToRgb(primary)},${a})`;
      bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2); bgCtx.fill();
    });
  } else if (t.bgEffect === 'radiation') {
    bgParticles.forEach(p => {
      p.radius += p.speed;
      if (p.radius > p.maxR) { p.radius=0; p.x=Math.random()*bgCanvas.width; p.y=Math.random()*bgCanvas.height; }
      const a = (1 - p.radius/p.maxR) * 0.12;
      bgCtx.strokeStyle = `rgba(${hexToRgb(primary)},${a})`;
      bgCtx.lineWidth = 1;
      bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.radius,0,Math.PI*2); bgCtx.stroke();
    });
  } else if (t.bgEffect === 'solar') {
    bgParticles.forEach(p => {
      p.life += 0.005; p.dist += p.speed*0.3;
      if (p.dist > 400) { p.dist=0; p.angle=Math.random()*Math.PI*2; p.life=0; }
      const x = bgCanvas.width/2 + Math.cos(p.angle)*p.dist;
      const y = bgCanvas.height/2 + Math.sin(p.angle)*p.dist;
      const a = (1-p.life)*0.3;
      bgCtx.fillStyle = `rgba(255,200,0,${a})`;
      bgCtx.beginPath(); bgCtx.arc(x,y,p.r,0,Math.PI*2); bgCtx.fill();
    });
  } else if (t.bgEffect === 'ghosts') {
    bgParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x<-p.r) p.x=bgCanvas.width+p.r;
      if (p.x>bgCanvas.width+p.r) p.x=-p.r;
      if (p.y<-p.r) p.y=bgCanvas.height+p.r;
      if (p.y>bgCanvas.height+p.r) p.y=-p.r;
      const grd = bgCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
      grd.addColorStop(0, `rgba(${hexToRgb(primary)},${p.alpha*2})`);
      grd.addColorStop(1, `rgba(${hexToRgb(primary)},0)`);
      bgCtx.fillStyle = grd;
      bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2); bgCtx.fill();
    });
  } else {
    // grid3d
    const t2 = Date.now()*0.0005;
    for (let i=0; i<8; i++) {
      const x = (Math.sin(t2+i)*0.5+0.5)*bgCanvas.width;
      const y = (Math.cos(t2*0.7+i*0.9)*0.5+0.5)*bgCanvas.height;
      bgCtx.fillStyle = `rgba(${hexToRgb(primary)},0.05)`;
      bgCtx.beginPath(); bgCtx.arc(x,y,80+i*10,0,Math.PI*2); bgCtx.fill();
    }
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ─── FOOD SHAPES ──────────────────────────────────────────────────────────
function drawFood(t) {
  const fx = food.x * CELL + CELL/2;
  const fy = food.y * CELL + CELL/2;
  const r = CELL/2 - 3;
  ctx.save();
  ctx.shadowColor = t.foodGlow;
  ctx.shadowBlur = 18;
  ctx.fillStyle = t.foodColor;
  ctx.strokeStyle = t.foodColor;
  ctx.lineWidth = 2;

  const pulse = Math.sin(Date.now()*0.006)*1.5;

  if (t.foodShape === 'circle') {
    ctx.beginPath(); ctx.arc(fx,fy,r+pulse*0.3,0,Math.PI*2); ctx.fill();
  } else if (t.foodShape === 'diamond') {
    const rr = r + pulse*0.3;
    ctx.beginPath(); ctx.moveTo(fx,fy-rr); ctx.lineTo(fx+rr,fy); ctx.lineTo(fx,fy+rr); ctx.lineTo(fx-rr,fy); ctx.closePath(); ctx.fill();
  } else if (t.foodShape === 'star') {
    drawStar(ctx, fx, fy, 5, r+pulse*0.3, r*0.5);
    ctx.fill();
  } else if (t.foodShape === 'square') {
    const rr = r+pulse*0.3;
    ctx.fillRect(fx-rr, fy-rr, rr*2, rr*2);
  } else if (t.foodShape === 'triangle') {
    const rr = r+pulse*0.3;
    ctx.beginPath(); ctx.moveTo(fx, fy-rr); ctx.lineTo(fx+rr*0.866, fy+rr*0.5); ctx.lineTo(fx-rr*0.866, fy+rr*0.5); ctx.closePath(); ctx.fill();
  } else if (t.foodShape === 'hexagon') {
    const rr = r+pulse*0.3;
    ctx.beginPath();
    for (let i=0;i<6;i++) { const a = i*Math.PI/3; ctx.lineTo(fx+rr*Math.cos(a), fy+rr*Math.sin(a)); }
    ctx.closePath(); ctx.fill();
  } else if (t.foodShape === 'moon') {
    const rr = r+pulse*0.3;
    ctx.beginPath(); ctx.arc(fx,fy,rr,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#0a0000';
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(fx+rr*0.4,fy-rr*0.2,rr*0.75,0,Math.PI*2); ctx.fill();
  } else if (t.foodShape === 'snowflake') {
    ctx.lineWidth = 2;
    ctx.strokeStyle = t.foodColor;
    for (let a=0; a<6; a++) {
      const ang = a*Math.PI/3 + Date.now()*0.001;
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(fx+Math.cos(ang)*(r+pulse*0.3), fy+Math.sin(ang)*(r+pulse*0.3)); ctx.stroke();
    }
  } else if (t.foodShape === 'sun') {
    ctx.beginPath(); ctx.arc(fx,fy,r*0.6,0,Math.PI*2); ctx.fill();
    for (let a=0;a<8;a++) {
      const ang = a*Math.PI/4 + Date.now()*0.001;
      ctx.beginPath(); ctx.moveTo(fx+Math.cos(ang)*(r*0.7), fy+Math.sin(ang)*(r*0.7));
      ctx.lineTo(fx+Math.cos(ang)*(r+pulse*0.3+2), fy+Math.sin(ang)*(r+pulse*0.3+2));
      ctx.stroke();
    }
  } else if (t.foodShape === 'ghost') {
    const rr = r+pulse*0.3;
    ctx.beginPath();
    ctx.arc(fx, fy-rr*0.2, rr, Math.PI, 0);
    ctx.lineTo(fx+rr, fy+rr*0.8);
    for (let i=2;i>=0;i--) { ctx.arc(fx+rr*(1-i*0.67) - rr, fy+rr*0.8, rr*0.33, 0, Math.PI, i%2===0); }
    ctx.lineTo(fx-rr, fy-rr*0.2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#040410'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(fx-rr*0.3, fy-rr*0.3, rr*0.15, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(fx+rr*0.3, fy-rr*0.3, rr*0.15, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  let rot = Math.PI/2*3, x, y, step = Math.PI/spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i=0; i<spikes; i++) {
    x = cx + Math.cos(rot)*outerR; y = cy + Math.sin(rot)*outerR; ctx.lineTo(x,y);
    rot += step;
    x = cx + Math.cos(rot)*innerR; y = cy + Math.sin(rot)*innerR; ctx.lineTo(x,y);
    rot += step;
  }
  ctx.lineTo(cx, cy-outerR); ctx.closePath();
}

// ─── GAME LOGIC ───────────────────────────────────────────────────────────
function init() {
  snake = [{x:Math.floor(COLS/2)+1, y:Math.floor(ROWS/2)}, {x:Math.floor(COLS/2), y:Math.floor(ROWS/2)}, {x:Math.floor(COLS/2)-1, y:Math.floor(ROWS/2)}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0;
  currentLevel = 0;
  updateTheme();
  placeFood();
  document.getElementById('score').textContent = '000';
  document.getElementById('level-num').textContent = '1';
}

function updateTheme() {
  theme = getLevel(currentLevel);
  document.documentElement.style.setProperty('--primary', theme.primary);
  document.documentElement.style.setProperty('--accent', theme.accent);
  document.body.style.background = theme.bg;
  document.getElementById('level-name').textContent = theme.name;
  document.getElementById('level-name').style.color = theme.accent;
  document.getElementById('canvas-wrap').style.borderColor = theme.primary;
  document.getElementById('canvas-wrap').style.boxShadow = `0 0 40px ${theme.primary}33, 0 0 80px ${theme.primary}11`;
  document.getElementById('title').style.color = theme.primary;
  document.getElementById('title').style.textShadow = `0 0 30px ${theme.primary}, 0 0 80px ${theme.primary}`;
  initBgParticles();
}

function placeFood() {
  let pos;
  do { pos = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food = pos;
}

function getSpeed() {
  return Math.max(55, 220 - currentLevel * 12);
}

function step() {
  dir = nextDir;
  const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) return gameOver();
  if (snake.some(s=>s.x===head.x&&s.y===head.y)) return gameOver();

  snake.unshift(head);

  if (head.x===food.x&&head.y===food.y) {
    score++;
    document.getElementById('score').textContent = String(score).padStart(3,'0');
    if (score > best) { best=score; localStorage.setItem('snakeBest2',best); document.getElementById('best').textContent=String(best).padStart(3,'0'); }

    // Level up every 5 food
    if (score % 5 === 0) {
      currentLevel++;
      document.getElementById('level-num').textContent = currentLevel+1;
      updateTheme();
      showLevelTransition();
    }

    // Spawn eat particles
    spawnParticles(head.x*CELL+CELL/2, head.y*CELL+CELL/2);
    placeFood();
    clearTimeout(loopTimer);
    loopTimer = setTimeout(step, getSpeed());
  } else {
    snake.pop();
    loopTimer = setTimeout(step, getSpeed());
  }
}

function spawnParticles(x, y) {
  for (let i=0;i<10;i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = 1+Math.random()*3;
    particles.push({x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:1, r:Math.random()*3+1, color:theme.foodColor});
  }
}

let bgAnimFrame;
function animLoop() {
  drawBg();
  bgAnimFrame = requestAnimationFrame(animLoop);
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const t = theme;

  // grid
  ctx.strokeStyle = t.gridColor;
  ctx.lineWidth = 0.5;
  for (let x=0;x<=COLS;x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
  for (let y=0;y<=ROWS;y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }

  // food
  drawFood(t);

  // particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life -= 0.06; p.vx *= 0.9; p.vy *= 0.9;
    if (p.life <= 0) return false;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
    return true;
  });

  // snake
  snake.forEach((seg,i) => {
    ctx.save();
    if (i === 0) {
      ctx.shadowColor = t.snakeHead;
      ctx.shadowBlur = 20;
      ctx.fillStyle = t.snakeHead;
    } else {
      ctx.fillStyle = t.snakeBody(i, snake.length);
    }
    const pad = i===0 ? 2 : 3;
    const rnd = i===0 ? 4 : 2;
    roundRect(ctx, seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, rnd);
    ctx.fill();

    // eyes on head
    if (i===0) {
      ctx.fillStyle = '#000';
      ctx.shadowBlur = 0;
      const ex1 = {x:0,y:0}, ex2 = {x:0,y:0};
      const ew = 3, cx = seg.x*CELL+CELL/2, cy = seg.y*CELL+CELL/2;
      if (dir.x===1) { ex1.x=cx+3; ex1.y=cy-3; ex2.x=cx+3; ex2.y=cy+3; }
      else if (dir.x===-1) { ex1.x=cx-3; ex1.y=cy-3; ex2.x=cx-3; ex2.y=cy+3; }
      else if (dir.y===1) { ex1.x=cx-3; ex1.y=cy+3; ex2.x=cx+3; ex2.y=cy+3; }
      else { ex1.x=cx-3; ex1.y=cy-3; ex2.x=cx+3; ex2.y=cy-3; }
      ctx.beginPath(); ctx.arc(ex1.x,ex1.y,ew/2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2.x,ex2.y,ew/2,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

let gameDrawFrame;
function gameLoop() {
  draw();
  gameDrawFrame = requestAnimationFrame(gameLoop);
}

function showLevelTransition() {
  const lt = document.getElementById('level-transition');
  document.getElementById('lt-num').textContent = `LVL ${currentLevel+1}`;
  document.getElementById('lt-num').style.color = theme.primary;
  document.getElementById('lt-num').style.textShadow = `0 0 40px ${theme.primary}`;
  document.getElementById('lt-name').textContent = theme.name;
  document.getElementById('lt-name').style.color = theme.accent;
  lt.style.background = `${theme.bg}cc`;
  lt.classList.add('show');
  setTimeout(() => lt.classList.remove('show'), 1200);
}

function gameOver() {
  clearTimeout(loopTimer);
  cancelAnimationFrame(gameDrawFrame);
  running = false;
  const overlay = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = 'GAME OVER';
  document.getElementById('overlay-title').style.color = '#ff2244';
  document.getElementById('overlay-title').style.textShadow = '0 0 30px #ff2244';
  document.getElementById('overlay-sub').textContent = `SCORE: ${score}  |  REACHED LEVEL ${currentLevel+1}\n${theme.name}`;
  document.getElementById('btn').textContent = 'RETRY';
  overlay.classList.remove('hidden');
}

function startGame() {
  const overlay = document.getElementById('overlay');
  overlay.classList.add('hidden');
  cancelAnimationFrame(gameDrawFrame);
  particles = [];
  init();
  running = true;
  gameLoop();
  loopTimer = setTimeout(step, getSpeed());
}

document.getElementById('btn').addEventListener('click', startGame);

// input
const DIRS = {
  ArrowUp:{x:0,y:-1}, w:{x:0,y:-1}, W:{x:0,y:-1},
  ArrowDown:{x:0,y:1}, s:{x:0,y:1}, S:{x:0,y:1},
  ArrowLeft:{x:-1,y:0}, a:{x:-1,y:0}, A:{x:-1,y:0},
  ArrowRight:{x:1,y:0}, d:{x:1,y:0}, D:{x:1,y:0},
};
document.addEventListener('keydown', e => {
  const d = DIRS[e.key];
  if (!d) return;
  e.preventDefault();
  if (!running) return;
  if (d.x===-dir.x && d.y===-dir.y) return;
  nextDir = d;
});
let ts = null;
document.addEventListener('touchstart', e => { ts=e.touches[0]; }, {passive:true});
document.addEventListener('touchend', e => {
  if (!ts||!running) return;
  const dx=e.changedTouches[0].clientX-ts.clientX, dy=e.changedTouches[0].clientY-ts.clientY;
  if (Math.abs(dx)>Math.abs(dy)) nextDir=dx>0?{x:1,y:0}:{x:-1,y:0};
  else nextDir=dy>0?{x:0,y:1}:{x:0,y:-1};
}, {passive:true});

// Initial draw
initBgParticles();
animLoop();
theme = getLevel(0);
init();
draw();
</script>
