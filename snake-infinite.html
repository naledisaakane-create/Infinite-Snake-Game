<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∞ SNAKE — Universe Mode</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--primary:#00ffcc;--bg:#03050a;--accent:#ff00aa;}
body{background:var(--bg);color:var(--primary);font-family:'Share Tech Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;transition:background 1.5s ease;}
#bg-canvas{position:fixed;inset:0;z-index:0;opacity:0.4;}
.wrapper{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;}
#title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(1.8rem,5vw,3.2rem);letter-spacing:0.3em;color:var(--primary);text-shadow:0 0 30px var(--primary),0 0 80px rgba(0,255,204,0.3);margin-bottom:4px;transition:color 1s,text-shadow 1s;}
#level-info{font-size:0.65rem;letter-spacing:0.4em;color:rgba(0,255,204,0.5);margin-bottom:16px;transition:color 1s;text-transform:uppercase;}
#hud{display:flex;gap:40px;margin-bottom:10px;font-size:0.7rem;letter-spacing:0.3em;}
.hud-item{text-align:center;}
.hud-label{opacity:0.4;font-size:0.55rem;display:block;margin-bottom:2px;}
.hud-val{font-size:1.1rem;font-weight:bold;font-family:'Orbitron',sans-serif;transition:color 1s;}
#game-box{position:relative;border:2px solid var(--primary);box-shadow:0 0 40px rgba(0,255,204,0.2);transition:border-color 1s,box-shadow 1s;}
#game-box::before,#game-box::after{content:'';position:absolute;width:12px;height:12px;border-color:inherit;border-style:solid;}
#game-box::before{top:-2px;left:-2px;border-width:2px 0 0 2px;}
#game-box::after{top:-2px;right:-2px;border-width:2px 2px 0 0;}
canvas{display:block;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(3,5,10,0.95);transition:opacity 0.3s;}
#overlay.hidden{opacity:0;pointer-events:none;}
#ov-icon{font-size:3rem;}
#ov-title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:2rem;letter-spacing:0.3em;color:var(--primary);text-shadow:0 0 20px var(--primary);}
#ov-sub{font-size:0.65rem;letter-spacing:0.35em;opacity:0.5;}
#ov-score{font-size:0.9rem;letter-spacing:0.2em;opacity:0.8;}
#ov-btn{background:var(--primary);color:#03050a;font-family:'Orbitron',sans-serif;font-weight:700;font-size:0.75rem;letter-spacing:0.25em;padding:12px 36px;border:none;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all 0.2s;margin-top:8px;}
#ov-btn:hover{background:#fff;box-shadow:0 0 30px rgba(0,255,204,0.6);}
#level-flash{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,5,10,0.92);opacity:0;pointer-events:none;transition:opacity 0.15s;gap:8px;z-index:10;}
#level-flash.show{opacity:1;}
#lf-num{font-family:'Orbitron',sans-serif;font-size:2.8rem;font-weight:900;letter-spacing:0.3em;}
#lf-name{font-size:0.65rem;letter-spacing:0.4em;opacity:0.6;text-transform:uppercase;}
#hi-burst{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:20;}
.confetti-piece{position:absolute;width:6px;height:6px;opacity:0;animation:cf 1.3s ease forwards;}
@keyframes cf{0%{opacity:1;transform:translateY(-10px) rotate(0deg);}100%{opacity:0;transform:translateY(450px) rotate(720deg);}}
#death-flash{position:absolute;inset:0;background:#ff2200;opacity:0;pointer-events:none;z-index:15;transition:opacity 0.08s;}
#death-flash.show{opacity:0.3;}
@keyframes screenShake{0%,100%{transform:translate(0,0);}20%{transform:translate(-8px,3px);}40%{transform:translate(8px,-3px);}60%{transform:translate(-5px,4px);}80%{transform:translate(5px,-2px);}}
.screen-shake{animation:screenShake 0.45s ease;}
@keyframes hiPop{0%{transform:scale(1);}40%{transform:scale(1.6);}100%{transform:scale(1);}}
.hi-pop{animation:hiPop 0.5s ease;}
#instructions{font-size:0.55rem;letter-spacing:0.3em;opacity:0.3;margin-top:10px;text-transform:uppercase;}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="wrapper">
  <div id="title">∞ SNAKE</div>
  <div id="level-info">THE VOID · LEVEL 1</div>
  <div id="hud">
    <div class="hud-item"><span class="hud-label">SCORE</span><span class="hud-val" id="score-display">0</span></div>
    <div class="hud-item"><span class="hud-label">BEST</span><span class="hud-val" id="best-display">0</span></div>
    <div class="hud-item"><span class="hud-label">LEVEL</span><span class="hud-val" id="level-display">1</span></div>
    <div class="hud-item"><span class="hud-label">LENGTH</span><span class="hud-val" id="length-display">3</span></div>
  </div>
  <div id="game-box">
    <canvas id="c"></canvas>
    <div id="hi-burst"></div>
    <div id="death-flash"></div>
    <div id="level-flash"><div id="lf-num">LVL 1</div><div id="lf-name">THE VOID</div></div>
    <div id="overlay">
      <div id="ov-icon">🐍</div>
      <div id="ov-title">∞ SNAKE</div>
      <div id="ov-sub">UNIVERSE MODE · INFINITE LEVELS</div>
      <div id="ov-score" style="opacity:0">—</div>
      <button id="ov-btn" onclick="startGame()">PRESS SPACE / ENTER</button>
    </div>
  </div>
  <div id="instructions">↑↓←→ · WASD · SWIPE TO MOVE</div>
</div>
<script>
// AUDIO
const AC=new (window.AudioContext||window.webkitAudioContext)();
function beep(freq,type,dur,vol,delay){
  try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=type;o.frequency.setValueAtTime(freq,AC.currentTime+delay);g.gain.setValueAtTime(vol,AC.currentTime+delay);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+delay+dur);o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+dur);}catch(e){}
}
function sndEat(){beep(440,'square',0.08,0.18,0);beep(660,'square',0.07,0.12,0.06);}
function sndLevel(){[262,330,392,523,659].forEach((f,i)=>beep(f,'square',0.12,0.18,i*0.08));}
function sndDeath(){[220,180,140,100,80].forEach((f,i)=>beep(f,'sawtooth',0.15,0.22,i*0.11));}
function sndHiScore(){[523,659,784,1047,1318,1568].forEach((f,i)=>beep(f,'square',0.12,0.18,i*0.09));}
function sndMove(){beep(180,'square',0.015,0.04,0);}

// THEMES
const LEVELS=[
  {name:"THE VOID",bg:"#03050a",snake:"#00ffcc",food:"#00ffcc",trail:"rgba(0,255,204,0.15)",glow:"0 0 15px #00ffcc",accent:"#00ffcc"},
  {name:"MAGMA CORE",bg:"#0a0300",snake:"#ff6600",food:"#ffaa00",trail:"rgba(255,102,0,0.15)",glow:"0 0 15px #ff6600",accent:"#ff6600"},
  {name:"DEEP OCEAN",bg:"#000a12",snake:"#00aaff",food:"#00eeff",trail:"rgba(0,170,255,0.15)",glow:"0 0 15px #00aaff",accent:"#00aaff"},
  {name:"NEON CITY",bg:"#0a0010",snake:"#ff00ff",food:"#ff44ff",trail:"rgba(255,0,255,0.15)",glow:"0 0 15px #ff00ff",accent:"#ff00ff"},
  {name:"ARCTIC ZERO",bg:"#050a0a",snake:"#aaeeff",food:"#ffffff",trail:"rgba(170,238,255,0.15)",glow:"0 0 15px #aaeeff",accent:"#aaeeff"},
  {name:"RADIOACTIVE",bg:"#030a00",snake:"#aaff00",food:"#ccff33",trail:"rgba(170,255,0,0.15)",glow:"0 0 15px #aaff00",accent:"#aaff00"},
  {name:"BLOOD MOON",bg:"#0a0000",snake:"#ff2200",food:"#ff5500",trail:"rgba(255,34,0,0.15)",glow:"0 0 15px #ff2200",accent:"#ff2200"},
  {name:"QUANTUM DREAM",bg:"#060010",snake:"#cc88ff",food:"#dd99ff",trail:"rgba(200,136,255,0.15)",glow:"0 0 15px #cc88ff",accent:"#cc88ff"},
  {name:"SOLAR FLARE",bg:"#0a0800",snake:"#ffdd00",food:"#ffee44",trail:"rgba(255,221,0,0.15)",glow:"0 0 15px #ffdd00",accent:"#ffdd00"},
  {name:"GHOST REALM",bg:"#030a08",snake:"#88ffee",food:"#aaffee",trail:"rgba(136,255,238,0.15)",glow:"0 0 15px #88ffee",accent:"#88ffee"},
];

const bgC=document.getElementById('bg-canvas'),bgX=bgC.getContext('2d');
function resizeBg(){bgC.width=window.innerWidth;bgC.height=window.innerHeight;}
resizeBg();window.addEventListener('resize',resizeBg);

// bg particles
const bgParts=[];
for(let i=0;i<60;i++)bgParts.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.5,sp:0.2+Math.random()*0.5,col:'rgba(0,255,204,0.3)'});

function drawBg(col){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  bgParts.forEach(p=>{
    p.y-=p.sp;if(p.y<0){p.y=bgC.height;p.x=Math.random()*bgC.width;}
    bgX.beginPath();bgX.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgX.fillStyle=col||'rgba(0,255,204,0.2)';bgX.fill();
  });
}

// GAME
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const COLS=25,ROWS=20,CELL=22;
canvas.width=COLS*CELL;canvas.height=ROWS*CELL;

let snake,dir,nextDir,food,score,running,loopTimer,level,theme;
let best=parseInt(localStorage.getItem('snakeBest2')||'0');
let deathParts=[],frame=0,dying=false;
let smooth=[],lastStep=0;
let particles=[];

function init(){
  const mx=Math.floor(COLS/2),my=Math.floor(ROWS/2);
  snake=[{x:mx+1,y:my},{x:mx,y:my},{x:mx-1,y:my}];
  smooth=snake.map(s=>({x:s.x*CELL,y:s.y*CELL}));
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;level=0;dying=false;deathParts=[];particles=[];
  theme=LEVELS[0];applyTheme();updateHUD();placeFood();lastStep=performance.now();
}

function applyTheme(){
  document.body.style.background=theme.bg;
  document.getElementById('title').style.color=theme.accent;
  document.getElementById('title').style.textShadow=`0 0 30px ${theme.accent},0 0 80px ${theme.accent}44`;
  document.getElementById('level-info').textContent=theme.name+' · LEVEL '+(level+1);
  document.getElementById('level-info').style.color=theme.accent+'88';
  document.getElementById('game-box').style.borderColor=theme.accent;
  document.getElementById('game-box').style.boxShadow=`0 0 40px ${theme.accent}33`;
  document.querySelectorAll('.hud-val').forEach(el=>el.style.color=theme.accent);
  bgParts.forEach(p=>p.col=theme.accent+'44');
}

function placeFood(){
  let p;do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}while(snake.some(s=>s.x===p.x&&s.y===p.y));food=p;
}
function spd(){return Math.max(65,220-level*13);}
function updateHUD(){
  document.getElementById('score-display').textContent=score;
  document.getElementById('best-display').textContent=best;
  document.getElementById('level-display').textContent=level+1;
  document.getElementById('length-display').textContent=snake.length;
}

function step(){
  if(dying)return;
  dir=nextDir;
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS)return triggerDeath();
  if(snake.some(s=>s.x===h.x&&s.y===h.y))return triggerDeath();
  snake.unshift(h);lastStep=performance.now();
  if(h.x===food.x&&h.y===food.y){
    score++;sndEat();
    // food particles
    for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*3;particles.push({x:food.x*CELL+CELL/2,y:food.y*CELL+CELL/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:Math.random()*4+1,col:theme.accent});}
    if(score>best){best=score;localStorage.setItem('snakeBest2',best);celebrate();}
    if(score%5===0){level++;theme=LEVELS[level%LEVELS.length];applyTheme();showLevelFlash();sndLevel();}
    updateHUD();placeFood();
    clearTimeout(loopTimer);loopTimer=setTimeout(step,spd());
  } else {
    snake.pop();
    loopTimer=setTimeout(step,spd());
  }
}

function updateSmooth(){
  for(let i=0;i<snake.length;i++){
    const tx=snake[i].x*CELL,ty=snake[i].y*CELL;
    if(!smooth[i])smooth[i]={x:tx,y:ty};
    smooth[i].x+=(tx-smooth[i].x)*0.38;smooth[i].y+=(ty-smooth[i].y)*0.38;
  }
  while(smooth.length>snake.length)smooth.pop();
}

function triggerDeath(){
  dying=true;sndDeath();
  const df=document.getElementById('death-flash');
  df.classList.add('show');setTimeout(()=>df.classList.remove('show'),150);
  const gb=document.getElementById('game-box');
  gb.classList.add('screen-shake');setTimeout(()=>gb.classList.remove('screen-shake'),450);
  deathParts=[];
  snake.forEach(seg=>{
    for(let i=0;i<5;i++){const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*4;deathParts.push({x:seg.x*CELL+CELL/2,y:seg.y*CELL+CELL/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:Math.random()*5+2,col:theme.accent});}
  });
  clearTimeout(loopTimer);setTimeout(gameOver,950);
}

function celebrate(){
  sndHiScore();
  const bd=document.getElementById('best-display');
  bd.classList.remove('hi-pop');void bd.offsetWidth;bd.classList.add('hi-pop');
  const burst=document.getElementById('hi-burst');
  burst.innerHTML='';
  for(let i=0;i<40;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText=`left:${10+Math.random()*80}%;top:${Math.random()*15}%;background:${theme.accent};animation-delay:${Math.random()*0.5}s;animation-duration:${0.9+Math.random()*0.8}s;transform:rotate(${Math.random()*360}deg);border-radius:${Math.random()>0.5?'50%':'2px'};box-shadow:0 0 6px ${theme.accent};`;
    burst.appendChild(el);
  }
  setTimeout(()=>burst.innerHTML='',2500);
}

let raf;
function gameLoop(){
  frame++;
  drawBg(theme.accent+'33');
  if(running&&!dying)updateSmooth();
  draw();
  raf=requestAnimationFrame(gameLoop);
}

function draw(){
  ctx.fillStyle=theme.bg+'ee';ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle=theme.accent+'15';ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}

  // food glow pulse
  if(food){
    const p=Math.sin(frame*0.12)*3,fx=food.x*CELL+CELL/2,fy=food.y*CELL+CELL/2;
    ctx.save();
    ctx.shadowBlur=15+p;ctx.shadowColor=theme.accent;
    ctx.fillStyle=theme.accent;
    ctx.beginPath();ctx.arc(fx,fy,5+p*0.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // star shape
    ctx.save();ctx.translate(fx,fy);ctx.rotate(frame*0.05);
    ctx.fillStyle=theme.accent;
    for(let i=0;i<5;i++){ctx.rotate((Math.PI*2)/5);ctx.beginPath();ctx.moveTo(0,-(4+p*0.2));ctx.lineTo(2,0);ctx.lineTo(0,2);ctx.lineTo(-2,0);ctx.fill();}
    ctx.restore();
  }

  // particles
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=0.04;p.vx*=0.9;p.vy*=0.9;
    if(p.life<=0)return false;
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.shadowBlur=8;ctx.shadowColor=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
    return true;
  });

  // death particles
  deathParts=deathParts.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=0.03;p.vx*=0.92;p.vy*=0.92;p.vy+=0.1;
    if(p.life<=0)return false;
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.shadowBlur=12;ctx.shadowColor=p.col;
    ctx.fillRect(p.x-p.r/2,p.y-p.r/2,p.r,p.r);ctx.restore();
    return true;
  });

  // snake
  const dl=running?smooth:snake.map(s=>({x:s.x*CELL,y:s.y*CELL}));
  dl.forEach((seg,i)=>{
    const al=dying?0.2:Math.max(0.3,1-i/snake.length*0.4);
    ctx.save();ctx.globalAlpha=al;
    if(i===0){
      // head glow
      if(!dying){ctx.shadowBlur=20;ctx.shadowColor=theme.accent;}
      ctx.fillStyle=dying?'#ff2200':theme.snake;
      ctx.fillRect(seg.x+1,seg.y+1,CELL-2,CELL-2);
      if(!dying){
        // eyes
        ctx.shadowBlur=0;ctx.fillStyle='#000';
        if(dir.x===1){ctx.fillRect(seg.x+13,seg.y+5,3,3);ctx.fillRect(seg.x+13,seg.y+12,3,3);}
        else if(dir.x===-1){ctx.fillRect(seg.x+6,seg.y+5,3,3);ctx.fillRect(seg.x+6,seg.y+12,3,3);}
        else if(dir.y===-1){ctx.fillRect(seg.x+5,seg.y+5,3,3);ctx.fillRect(seg.x+14,seg.y+5,3,3);}
        else{ctx.fillRect(seg.x+5,seg.y+14,3,3);ctx.fillRect(seg.x+14,seg.y+14,3,3);}
        ctx.fillStyle='#fff';
        if(dir.x===1){ctx.fillRect(seg.x+14,seg.y+6,1,1);ctx.fillRect(seg.x+14,seg.y+13,1,1);}
        else if(dir.x===-1){ctx.fillRect(seg.x+7,seg.y+6,1,1);ctx.fillRect(seg.x+7,seg.y+13,1,1);}
        else if(dir.y===-1){ctx.fillRect(seg.x+6,seg.y+6,1,1);ctx.fillRect(seg.x+15,seg.y+6,1,1);}
        else{ctx.fillRect(seg.x+6,seg.y+15,1,1);ctx.fillRect(seg.x+15,seg.y+15,1,1);}
      }
    } else {
      if(!dying){ctx.shadowBlur=8;ctx.shadowColor=theme.accent;}
      ctx.fillStyle=dying?'#ff220055':theme.snake;
      const shrink=Math.min(i*0.5,3);
      ctx.fillRect(seg.x+2+shrink,seg.y+2+shrink,CELL-4-shrink*2,CELL-4-shrink*2);
      if(i%3===0&&!dying){
        ctx.shadowBlur=0;ctx.fillStyle=theme.accent+'33';
        ctx.fillRect(seg.x+5,seg.y+5,4,4);ctx.fillRect(seg.x+11,seg.y+11,4,4);
      }
    }
    ctx.restore();
  });
}

function showLevelFlash(){
  const lf=document.getElementById('level-flash');
  document.getElementById('lf-num').textContent='LVL '+(level+1);
  document.getElementById('lf-name').textContent=theme.name;
  document.getElementById('lf-num').style.color=theme.accent;
  document.getElementById('lf-num').style.textShadow=`0 0 20px ${theme.accent}`;
  lf.classList.add('show');setTimeout(()=>lf.classList.remove('show'),950);
}

function gameOver(){
  clearTimeout(loopTimer);cancelAnimationFrame(raf);running=false;
  const ov=document.getElementById('overlay');
  document.getElementById('ov-icon').textContent='💀';
  document.getElementById('ov-title').textContent='GAME OVER';
  document.getElementById('ov-title').style.color=theme.accent;
  document.getElementById('ov-sub').textContent=theme.name+' · LEVEL '+(level+1);
  const os=document.getElementById('ov-score');
  os.style.opacity='1';
  os.textContent='SCORE: '+score+'   BEST: '+best;
  document.getElementById('ov-btn').style.background=theme.accent;
  ov.classList.remove('hidden');draw();
}

function startGame(){
  if(AC.state==='suspended')AC.resume();
  document.getElementById('overlay').classList.add('hidden');
  cancelAnimationFrame(raf);init();running=true;
  gameLoop();lastStep=performance.now();loopTimer=setTimeout(step,spd());
}

document.getElementById('best-display').textContent=best;

const DIRS={ArrowUp:{x:0,y:-1},w:{x:0,y:-1},W:{x:0,y:-1},ArrowDown:{x:0,y:1},s:{x:0,y:1},S:{x:0,y:1},ArrowLeft:{x:-1,y:0},a:{x:-1,y:0},A:{x:-1,y:0},ArrowRight:{x:1,y:0},d:{x:1,y:0},D:{x:1,y:0}};
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){if(!running){startGame();return;}}
  const d=DIRS[e.key];if(!d)return;e.preventDefault();if(!running)return;
  if(d.x===-dir.x&&d.y===-dir.y)return;
  nextDir=d;sndMove();
});
let ts=null;
document.addEventListener('touchstart',e=>{ts=e.touches[0];},{passive:true});
document.addEventListener('touchend',e=>{
  if(!ts||!running)return;
  const dx=e.changedTouches[0].clientX-ts.clientX,dy=e.changedTouches[0].clientY-ts.clientY;
  if(Math.abs(dx)>Math.abs(dy))nextDir=dx>0?{x:1,y:0}:{x:-1,y:0};
  else nextDir=dy>0?{x:0,y:1}:{x:0,y:-1};
},{passive:true});
init();gameLoop();
</script>
</body>
</html>
