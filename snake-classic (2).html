<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∞ SNAKE — Classic Mode</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f7f7f7;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;}
#hud{display:flex;align-items:center;justify-content:space-between;width:600px;margin-bottom:8px;padding:0 4px;}
#hud-title{font-size:0.75rem;font-weight:bold;letter-spacing:0.2em;color:#535353;text-transform:uppercase;}
#hud-scores{display:flex;gap:24px;}
.hud-score{text-align:right;}
.hud-score-label{font-size:0.55rem;color:#535353;letter-spacing:0.15em;display:block;}
.hud-score-val{font-size:1rem;font-weight:bold;color:#535353;letter-spacing:0.1em;}
#game-wrap{position:relative;width:600px;background:#f7f7f7;border-top:2px solid #535353;border-bottom:2px solid #535353;}
canvas{display:block;}
#level-badge{position:absolute;top:10px;left:10px;font-size:0.6rem;letter-spacing:0.2em;color:#aaaaaa;text-transform:uppercase;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#f7f7f7;transition:opacity 0.3s;}
#overlay.hidden{opacity:0;pointer-events:none;}
#overlay-icon{font-size:3rem;line-height:1;transition:transform 0.3s;}
#overlay-title{font-size:1.8rem;font-weight:bold;letter-spacing:0.3em;color:#535353;text-transform:uppercase;}
#overlay-sub{font-size:0.7rem;letter-spacing:0.2em;color:#888;text-transform:uppercase;}
#overlay-score{font-size:0.85rem;letter-spacing:0.2em;color:#535353;font-weight:bold;}
#restart-hint{display:flex;align-items:center;gap:10px;margin-top:4px;}
.key-hint{border:2px solid #535353;padding:4px 12px;font-size:0.65rem;letter-spacing:0.15em;color:#535353;text-transform:uppercase;cursor:pointer;transition:background 0.15s;}
.key-hint:hover{background:#535353;color:#f7f7f7;}
#instructions{width:600px;display:flex;justify-content:space-between;margin-top:8px;padding:0 4px;}
.inst{font-size:0.6rem;color:#aaaaaa;letter-spacing:0.15em;text-transform:uppercase;}
#level-flash{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f7f7f7;opacity:0;pointer-events:none;transition:opacity 0.15s;gap:8px;z-index:10;}
#level-flash.show{opacity:1;}
#lf-num{font-size:2.5rem;font-weight:bold;letter-spacing:0.3em;}
#lf-name{font-size:0.7rem;letter-spacing:0.3em;color:#888;text-transform:uppercase;}
#hi-burst{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:20;}
.confetti-piece{position:absolute;width:8px;height:8px;opacity:0;animation:confettiFall 1.2s ease forwards;}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-10px) rotate(0deg);}100%{opacity:0;transform:translateY(430px) rotate(720deg);}}
#death-flash{position:absolute;inset:0;background:#ff2200;opacity:0;pointer-events:none;z-index:15;transition:opacity 0.08s;}
#death-flash.show{opacity:0.35;}
@keyframes screenShake{0%,100%{transform:translate(0,0);}20%{transform:translate(-6px,2px);}40%{transform:translate(6px,-2px);}60%{transform:translate(-4px,3px);}80%{transform:translate(4px,-1px);}}
.screen-shake{animation:screenShake 0.4s ease;}
@keyframes hiPop{0%{transform:scale(1);color:#535353;}40%{transform:scale(1.5);color:#ff6600;}100%{transform:scale(1);color:#535353;}}
.hi-pop{animation:hiPop 0.5s ease;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.blink{animation:blink 1s infinite;}
</style>
</head>
<body>
<div id="hud">
  <div id="hud-title">∞ SNAKE — CLASSIC</div>
  <div id="hud-scores">
    <div class="hud-score"><span class="hud-score-label">HI</span><span class="hud-score-val" id="best-display">00000</span></div>
    <div class="hud-score"><span class="hud-score-label">&nbsp;</span><span class="hud-score-val" id="score-display">00000</span></div>
  </div>
</div>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="level-badge">LVL 1</div>
  <div id="hi-burst"></div>
  <div id="death-flash"></div>
  <div id="level-flash"><div id="lf-num">LVL 1</div><div id="lf-name">THE VOID</div></div>
  <div id="overlay">
    <div id="overlay-icon">🐍</div>
    <div id="overlay-title">∞ SNAKE</div>
    <div id="overlay-sub">Classic Mode</div>
    <div id="overlay-score" style="opacity:0">—</div>
    <div id="restart-hint">
      <div class="key-hint" onclick="startGame()">SPACE / ENTER</div>
      <div style="font-size:0.6rem;color:#aaa;letter-spacing:0.1em;">TO START</div>
    </div>
  </div>
</div>
<div id="instructions">
  <span class="inst">↑↓←→ · WASD · SWIPE</span>
  <span class="inst" id="level-name-bottom">THE VOID</span>
  <span class="inst">EVERY 5 FOOD = NEW LEVEL</span>
</div>
<script>
// AUDIO
const AC = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq,type,dur,vol,delay){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.setValueAtTime(freq,AC.currentTime+delay);
    g.gain.setValueAtTime(vol,AC.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+delay+dur);
    o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+dur);
  }catch(e){}
}
function sndEat(){beep(440,'square',0.08,0.2,0);beep(660,'square',0.08,0.15,0.06);}
function sndLevel(){[262,330,392,523].forEach((f,i)=>beep(f,'square',0.12,0.2,i*0.09));}
function sndDeath(){[220,180,140,100].forEach((f,i)=>beep(f,'sawtooth',0.15,0.25,i*0.12));}
function sndHiScore(){[523,659,784,1047,1318].forEach((f,i)=>beep(f,'square',0.12,0.2,i*0.1));}
function sndMove(){beep(200,'square',0.02,0.04,0);}

// SETUP
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const COLS=30,ROWS=20,CELL=20;
canvas.width=COLS*CELL;canvas.height=ROWS*CELL;

const THEMES=[
  {name:"THE VOID",bg:"#f7f7f7",snake:"#535353",food:"#535353",grid:"rgba(0,0,0,0.04)",obs:"#888"},
  {name:"MAGMA CORE",bg:"#fff8f5",snake:"#8B2500",food:"#CC4400",grid:"rgba(139,37,0,0.04)",obs:"#CC4400"},
  {name:"DEEP OCEAN",bg:"#f5f8ff",snake:"#003366",food:"#0055aa",grid:"rgba(0,51,102,0.04)",obs:"#0055aa"},
  {name:"NEON CITY",bg:"#fdf5ff",snake:"#440066",food:"#880088",grid:"rgba(68,0,102,0.04)",obs:"#880088"},
  {name:"ARCTIC ZERO",bg:"#f5feff",snake:"#004455",food:"#006677",grid:"rgba(0,68,85,0.04)",obs:"#006677"},
  {name:"RADIOACTIVE",bg:"#f8fff5",snake:"#2a4400",food:"#446600",grid:"rgba(42,68,0,0.04)",obs:"#446600"},
  {name:"BLOOD MOON",bg:"#fff5f5",snake:"#660000",food:"#990000",grid:"rgba(102,0,0,0.04)",obs:"#990000"},
  {name:"QUANTUM DREAM",bg:"#faf5ff",snake:"#330055",food:"#550077",grid:"rgba(51,0,85,0.04)",obs:"#550077"},
  {name:"SOLAR FLARE",bg:"#fffdf5",snake:"#554400",food:"#886600",grid:"rgba(85,68,0,0.04)",obs:"#886600"},
  {name:"GHOST REALM",bg:"#f5fffd",snake:"#1a3330",food:"#2a5550",grid:"rgba(26,51,48,0.04)",obs:"#2a5550"},
];

let snake,dir,nextDir,food,obs,score,running,loopTimer,level,theme;
let best=parseInt(localStorage.getItem('snakeClassicBest')||'0');
let clouds=[],deathParts=[],frame=0,dying=false;
let smooth=[],lastStep=0;

function initClouds(){clouds=[];for(let i=0;i<4;i++)clouds.push({x:Math.random()*canvas.width,y:20+Math.random()*60,w:40+Math.random()*40,sp:0.3+Math.random()*0.3});}

function init(){
  const mx=Math.floor(COLS/2),my=Math.floor(ROWS/2);
  snake=[{x:mx+1,y:my},{x:mx,y:my},{x:mx-1,y:my}];
  smooth=snake.map(s=>({x:s.x*CELL,y:s.y*CELL}));
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;level=0;obs=[];dying=false;deathParts=[];
  theme=THEMES[0];updateHUD();placeFood();initClouds();lastStep=performance.now();
}

function placeFood(){
  let p;
  do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===p.x&&s.y===p.y)||obs.some(o=>o.x===p.x&&o.y===p.y));
  food=p;
}

function addObs(){
  if(level<3)return;
  let p,n=0;
  do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};n++;}
  while(n<50&&(snake.some(s=>s.x===p.x&&s.y===p.y)||obs.some(o=>o.x===p.x&&o.y===p.y)||(food&&food.x===p.x&&food.y===p.y)));
  if(n<50)obs.push(p);
}

function spd(){return Math.max(65,220-level*13);}
function updateHUD(){
  document.getElementById('score-display').textContent=String(score).padStart(5,'0');
  document.getElementById('best-display').textContent=String(best).padStart(5,'0');
  document.getElementById('level-badge').textContent='LVL '+(level+1);
  document.getElementById('level-name-bottom').textContent=theme.name;
}

function step(){
  if(dying)return;
  dir=nextDir;
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS)return triggerDeath();
  if(snake.some(s=>s.x===h.x&&s.y===h.y))return triggerDeath();
  if(obs.some(o=>o.x===h.x&&o.y===h.y))return triggerDeath();
  snake.unshift(h);lastStep=performance.now();
  if(h.x===food.x&&h.y===food.y){
    score++;sndEat();
    if(score>best){best=score;localStorage.setItem('snakeClassicBest',best);celebrate();}
    if(score%5===0){level++;theme=THEMES[level%THEMES.length];addObs();showLevelFlash();sndLevel();}
    updateHUD();placeFood();
    clearTimeout(loopTimer);loopTimer=setTimeout(step,spd());
  } else {
    snake.pop();
    loopTimer=setTimeout(step,spd());
  }
}

function updateSmooth(){
  for(let i=0;i<snake.length;i++){
    const tx=snake[i].x*CELL,ty=snake[i].y*CELL;
    if(!smooth[i])smooth[i]={x:tx,y:ty};
    smooth[i].x+=(tx-smooth[i].x)*0.38;
    smooth[i].y+=(ty-smooth[i].y)*0.38;
  }
  while(smooth.length>snake.length)smooth.pop();
}

function triggerDeath(){
  dying=true;sndDeath();
  const df=document.getElementById('death-flash');
  df.classList.add('show');setTimeout(()=>df.classList.remove('show'),150);
  const gw=document.getElementById('game-wrap');
  gw.classList.add('screen-shake');setTimeout(()=>gw.classList.remove('screen-shake'),400);
  deathParts=[];
  snake.forEach(seg=>{
    for(let i=0;i<4;i++){
      const a=Math.random()*Math.PI*2,sp=1+Math.random()*3.5;
      deathParts.push({x:seg.x*CELL+CELL/2,y:seg.y*CELL+CELL/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:Math.random()*5+2,col:theme.snake});
    }
  });
  clearTimeout(loopTimer);
  setTimeout(gameOver,900);
}

function celebrate(){
  sndHiScore();
  const bd=document.getElementById('best-display');
  bd.classList.remove('hi-pop');void bd.offsetWidth;bd.classList.add('hi-pop');
  const burst=document.getElementById('hi-burst');
  burst.innerHTML='';
  const cols=['#ff6600','#ffcc00','#00aa55','#0055ff','#cc00aa','#ff2200','#00ccff'];
  for(let i=0;i<35;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${10+Math.random()*80}%;top:${Math.random()*20}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()*0.5}s;animation-duration:${0.9+Math.random()*0.7}s;transform:rotate(${Math.random()*360}deg);border-radius:${Math.random()>0.5?'50%':'2px'};`;
    burst.appendChild(el);
  }
  setTimeout(()=>burst.innerHTML='',2500);
}

let raf;
function gameLoop(){
  frame++;
  clouds.forEach(c=>{c.x-=c.sp;if(c.x+c.w<0){c.x=canvas.width+20;c.y=20+Math.random()*60;}});
  if(running&&!dying)updateSmooth();
  draw();
  raf=requestAnimationFrame(gameLoop);
}

function draw(){
  const t=theme;
  ctx.fillStyle=t.bg;ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle=t.grid;ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}
  ctx.fillStyle=t.grid.replace('0.04','0.3');
  clouds.forEach(c=>{ctx.beginPath();ctx.arc(c.x+c.w*0.3,c.y,c.w*0.25,0,Math.PI*2);ctx.arc(c.x+c.w*0.6,c.y-6,c.w*0.2,0,Math.PI*2);ctx.arc(c.x+c.w*0.7,c.y,c.w*0.22,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle=t.obs;
  obs.forEach(o=>{const ox=o.x*CELL,oy=o.y*CELL;ctx.fillRect(ox+6,oy+2,8,16);ctx.fillRect(ox+2,oy+6,6,4);ctx.fillRect(ox+12,oy+8,6,4);ctx.fillRect(ox+2,oy+2,4,6);ctx.fillRect(ox+14,oy+4,4,6);});
  if(food){
    const p=Math.sin(frame*0.1)*1.5,fx=food.x*CELL,fy=food.y*CELL;
    ctx.fillStyle=t.food;
    ctx.fillRect(fx+4-p*0.3,fy+6-p*0.3,12+p*0.6,10+p*0.6);
    ctx.fillRect(fx+6,fy+4,8,2);ctx.fillRect(fx+4,fy+4,2,2);ctx.fillRect(fx+14,fy+4,2,2);
    ctx.fillRect(fx+9,fy+2,3,4);ctx.fillRect(fx+11,fy+2,3,2);
  }
  deathParts=deathParts.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=0.035;p.vx*=0.93;p.vy*=0.93;p.vy+=0.12;
    if(p.life<=0)return false;
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.fillRect(p.x-p.r/2,p.y-p.r/2,p.r,p.r);ctx.restore();
    return true;
  });
  const dl=running?smooth:snake.map(s=>({x:s.x*CELL,y:s.y*CELL}));
  dl.forEach((seg,i)=>{
    if(i===0){
      ctx.save();
      ctx.fillStyle=dying?'#ff2200':t.snake;
      if(dying)ctx.globalAlpha=0.35;
      ctx.fillRect(seg.x+1,seg.y+1,CELL-2,CELL-2);
      if(!dying){
        ctx.fillStyle=t.bg;
        if(dir.x===1){ctx.fillRect(seg.x+12,seg.y+5,4,4);ctx.fillRect(seg.x+12,seg.y+11,4,4);ctx.fillStyle=t.snake;ctx.fillRect(seg.x+14,seg.y+6,2,2);ctx.fillRect(seg.x+14,seg.y+12,2,2);}
        else if(dir.x===-1){ctx.fillRect(seg.x+4,seg.y+5,4,4);ctx.fillRect(seg.x+4,seg.y+11,4,4);ctx.fillStyle=t.snake;ctx.fillRect(seg.x+4,seg.y+6,2,2);ctx.fillRect(seg.x+4,seg.y+12,2,2);}
        else if(dir.y===-1){ctx.fillRect(seg.x+5,seg.y+4,4,4);ctx.fillRect(seg.x+11,seg.y+4,4,4);ctx.fillStyle=t.snake;ctx.fillRect(seg.x+6,seg.y+4,2,2);ctx.fillRect(seg.x+12,seg.y+4,2,2);}
        else{ctx.fillRect(seg.x+5,seg.y+12,4,4);ctx.fillRect(seg.x+11,seg.y+12,4,4);ctx.fillStyle=t.snake;ctx.fillRect(seg.x+6,seg.y+14,2,2);ctx.fillRect(seg.x+12,seg.y+14,2,2);}
        ctx.fillStyle='#cc2200';
        if(dir.x===1){ctx.fillRect(seg.x+18,seg.y+9,3,2);ctx.fillRect(seg.x+20,seg.y+8,2,1);ctx.fillRect(seg.x+20,seg.y+11,2,1);}
        else if(dir.x===-1){ctx.fillRect(seg.x-1,seg.y+9,3,2);ctx.fillRect(seg.x-1,seg.y+8,2,1);ctx.fillRect(seg.x-1,seg.y+11,2,1);}
        else if(dir.y===-1){ctx.fillRect(seg.x+9,seg.y-1,2,3);ctx.fillRect(seg.x+8,seg.y-1,1,2);ctx.fillRect(seg.x+11,seg.y-1,1,2);}
        else{ctx.fillRect(seg.x+9,seg.y+18,2,3);ctx.fillRect(seg.x+8,seg.y+20,1,2);ctx.fillRect(seg.x+11,seg.y+20,1,2);}
      }
      ctx.restore();
    } else {
      const al=Math.max(0.3,1-i/snake.length*0.5);
      ctx.save();ctx.globalAlpha=dying?al*0.2:al;
      ctx.fillStyle=dying?'#ff2200':t.snake;
      ctx.fillRect(seg.x+2,seg.y+2,CELL-4,CELL-4);
      if(i%2===0&&!dying){ctx.fillStyle=t.bg;ctx.globalAlpha=al*0.25;ctx.fillRect(seg.x+5,seg.y+5,4,4);ctx.fillRect(seg.x+11,seg.y+11,4,4);}
      ctx.restore();
    }
  });
  ctx.fillStyle=t.snake;ctx.fillRect(0,canvas.height-2,canvas.width,2);
}

function showLevelFlash(){
  const lf=document.getElementById('level-flash');
  document.getElementById('lf-num').textContent='LVL '+(level+1);
  document.getElementById('lf-name').textContent=theme.name;
  lf.querySelector('#lf-num').style.color=theme.snake;
  lf.classList.add('show');setTimeout(()=>lf.classList.remove('show'),900);
}

function gameOver(){
  clearTimeout(loopTimer);cancelAnimationFrame(raf);running=false;
  const ov=document.getElementById('overlay');
  document.getElementById('overlay-icon').textContent='💀';
  document.getElementById('overlay-title').textContent='GAME OVER';
  document.getElementById('overlay-sub').textContent=theme.name+' · LVL '+(level+1);
  const os=document.getElementById('overlay-score');
  os.style.opacity='1';
  os.textContent='SCORE: '+String(score).padStart(5,'0')+'  HI: '+String(best).padStart(5,'0');
  ov.classList.remove('hidden');draw();
}

function startGame(){
  if(AC.state==='suspended')AC.resume();
  document.getElementById('overlay').classList.add('hidden');
  cancelAnimationFrame(raf);init();running=true;
  gameLoop();lastStep=performance.now();loopTimer=setTimeout(step,spd());
}

document.getElementById('best-display').textContent=String(best).padStart(5,'0');

const DIRS={ArrowUp:{x:0,y:-1},w:{x:0,y:-1},W:{x:0,y:-1},ArrowDown:{x:0,y:1},s:{x:0,y:1},S:{x:0,y:1},ArrowLeft:{x:-1,y:0},a:{x:-1,y:0},A:{x:-1,y:0},ArrowRight:{x:1,y:0},d:{x:1,y:0},D:{x:1,y:0}};
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){if(!running){startGame();return;}}
  const d=DIRS[e.key];if(!d)return;e.preventDefault();if(!running)return;
  if(d.x===-dir.x&&d.y===-dir.y)return;
  nextDir=d;sndMove();
});
let ts=null;
document.addEventListener('touchstart',e=>{ts=e.touches[0];},{passive:true});
document.addEventListener('touchend',e=>{
  if(!ts||!running)return;
  const dx=e.changedTouches[0].clientX-ts.clientX,dy=e.changedTouches[0].clientY-ts.clientY;
  if(Math.abs(dx)>Math.abs(dy))nextDir=dx>0?{x:1,y:0}:{x:-1,y:0};
  else nextDir=dy>0?{x:0,y:1}:{x:0,y:-1};
},{passive:true});
init();draw();
</script>
</body>
</html>
